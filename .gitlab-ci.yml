---
stages:
  - test
  - build
  - post-test
  - deploy

include:
  - component: gl.vprw.ru/ci/sast/sast@1
  - component: gl.vprw.ru/ci/sast/iac@1
  - component: gl.vprw.ru/ci/sast/bearer@1
  - component: gl.vprw.ru/ci/sast/datadog@1
  - component: gl.vprw.ru/ci/secret-detection/sd@1
  - component: gl.vprw.ru/ci/dependency-scanning/ds@1
  - component: gl.vprw.ru/ci/typescript/install-pnpm@1
  - component: gl.vprw.ru/ci/typescript/lint-check@1
  - component: gl.vprw.ru/ci/typescript/build@1
  - component: gl.vprw.ru/ci/docker/build-buildah@3
    inputs:
      ci_image_name: frontend
      ci_image_tags: latest,$CI_COMMIT_SHA
      dockerfile_path: Dockerfile
      build_args: --secret id=NODE_ENV,type=env --secret id=SENTRY_AUTH_TOKEN,type=env
  - component: gl.vprw.ru/ci/container-scanning/cs@1
    inputs:
      default_branch_image: $CI_REGISTRY_IMAGE/frontend:latest
      application_repository: $CI_REGISTRY_IMAGE/frontend
      application_tag: latest
  - component: gl.vprw.ru/ci/helmfile/deploy@1
    inputs:
      working_dir: support/kubernetes
      helmfile_path: support/kubernetes/helmfile.yaml.gotmpl

.build rules for frontend: &build-rules-frontend
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build docker image:
  <<: *build-rules-frontend

create manifest:
  <<: *build-rules-frontend

container scanning:
  <<: *build-rules-frontend

helmfile deploy:
  <<: *build-rules-frontend
  environment:
    name: production
    url: https://markiplier.dog
